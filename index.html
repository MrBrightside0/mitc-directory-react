    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #020617;
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }
      #splash.hide {
        opacity: 0;
        visibility: hidden;
      }

      /* Logo */
      #splash .logo {
        width: 140px;
        filter: brightness(0) invert(1);
        opacity: 0;
        animation: sIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
      }

      /* Animated line below logo */
      #splash .line {
        width: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, #6366f1, #06b6d4, transparent);
        margin-top: 24px;
        animation: sLineGrow 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
      }

      /* Text */
      #splash .text {
        margin-top: 16px;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: #64748b;
        opacity: 0;
        animation: sIn 0.5s ease 0.7s forwards;
      }

      /* Dots loader */
      #splash .dots {
        display: flex;
        gap: 6px;
        margin-top: 32px;
        opacity: 0;
        animation: sIn 0.4s ease 0.9s forwards;
      }
      #splash .dots span {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #6366f1;
        animation: sBounce 1.4s ease-in-out infinite;
      }
      #splash .dots span:nth-child(2) { animation-delay: 0.2s; }
      #splash .dots span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes sIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes sLineGrow {
        from { width: 0; }
        to { width: 120px; }
      }
      @keyframes sBounce {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
